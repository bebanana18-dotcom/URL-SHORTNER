apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  namespace: url-shortener
type: Opaque
# Values must be base64 encoded.
# To encode: echo -n 'yourpassword' | base64
# "postgres" base64 → cG9zdGdyZXM=
# Change these before any real deployment.
data:
  DB_PASS: cG9zdGdyZXM=    # postgres
  DB_USER: cG9zdGdyZXM=    # postgres
  DB_NAME: dXJsc2hvcnRlbmVy  # urlshortener
