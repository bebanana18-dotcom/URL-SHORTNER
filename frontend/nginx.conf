server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── React Router fix ─────────────────────────────────────────────────────
    # Without this, refreshing /anything returns 404.
    # Nginx looks for the file, doesn't find it, falls back to index.html,
    # and React Router takes over from there.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy /api calls to the backend ──────────────────────────────────────
    # React calls /api/stats → nginx forwards to http://backend:5000/api/stats
    # "backend" is the service name in docker-compose — Docker DNS resolves it.
    location /api/ {
        proxy_pass         http://short-url.abc-app.org;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Static asset caching ─────────────────────────────────────────────────
    # Vite fingerprints filenames (main.abc123.js) so cache forever safely.
    location ~* \.(js|css|png|jpg|svg|ico|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1000;
}
